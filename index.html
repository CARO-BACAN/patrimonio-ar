<!DOCTYPE html>
<html>
  <head>
    <title>Prueba AR.js en Vivo Y27</title>
    <!-- Importamos A-Frame y el componente AR.js -->
    <script src="https://aframe.io"></script>
    <script src="https://githack.com"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <!-- Iniciamos la escena de Realidad Aumentada -->
    <a-scene embedded arjs>
      <!-- Definimos el marcador estándar "HIRO" -->
      <a-marker preset="hiro">
        <!-- Colocamos una caja roja encima del marcador -->
        <a-box position="0 0.5 0" material="color: red;"></a-box>
      </a-marker>
      <!-- Activamos la cámara trasera como fondo -->
      
    </a-scene>
  </body>
</html>
