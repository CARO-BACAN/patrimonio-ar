<!DOCTYPE html>
<html>
  <head>
    <title>WebAR - O'Higgins</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    
    <style>
      #pantalla-carga {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        color: #ffffff;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
        padding: 5%;
        box-sizing: border-box;
        transition: opacity 0.8s ease;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: girar 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes girar {
        to { transform: rotate(360deg); }
      }
      
      /* Nueva animación de parpadeo suave */
      @keyframes parpadeo {
        0% { opacity: 0.15; }
        50% { opacity: 0.6; }
        100% { opacity: 0.15; }
      }

      /* Estilos para la imagen del patrón en la carga con la animación aplicada */
      #imagen-patrón {
        width: 180px;
        max-width: 50vw;
        border-radius: 10px;
        margin-bottom: 25px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        animation: parpadeo 2.5s ease-in-out infinite; /* Llama a la animación */
      }
      
      #pantalla-carga h2 {
        font-size: clamp(1.2rem, 5vw, 1.8rem);
        margin: 0 0 10px 0;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      #pantalla-carga p {
        font-size: clamp(0.9rem, 3.5vw, 1.1rem);
        margin: 0;
        max-width: 600px;
        color: #b3b3b3;
        line-height: 1.6;
      }
    </style>

    <script>
      AFRAME.registerComponent('controlador-audio', {
        init: function () {
          let audio = document.querySelector('#mi-audio');
          this.el.addEventListener('markerFound', () => {
            audio.play();
          });
          this.el.addEventListener('markerLost', () => {
            audio.pause();
            audio.currentTime = 0;
          });
        }
      });

      AFRAME.registerComponent('fake-envmap', {
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            const texture = new THREE.TextureLoader().load('reflejo.jpg');
            texture.mapping = THREE.EquirectangularReflectionMapping;
            mesh.traverse((node) => {
              if (node.isMesh && node.material && 'envMap' in node.material) {
                node.material.envMap = texture;
                node.material.needsUpdate = true;
              }
            });
          });
        }
      });

      window.addEventListener('load', () => {
        const escena = document.querySelector('a-scene');
        escena.addEventListener('loaded', () => {
          setTimeout(() => {
            const pantalla = document.getElementById('pantalla-carga');
            pantalla.style.opacity = '0';
            setTimeout(() => {
              pantalla.style.display = 'none';
            }, 800);
          }, 1500);
        });
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <div id="pantalla-carga">
      <!-- Aquí agregamos tu imagen png con el patrón -->
      <img id="imagen-patrón" src="patron.png" alt="Busca este patrón">
      <div class="spinner"></div>
      <h2>Iniciando Realidad Aumentada</h2>
      <p>Apunta tu cámara a esta imagen para visualizar la estatua interactiva.</p>
    </div>

    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true;">
      
      <a-assets>
        <a-asset-item id="estatua" src="EstatuaBernardoOhiggins.glb"></a-asset-item>
        <audio id="mi-audio" src="audio.mp3" preload="auto"></audio>
      </a-assets>

      <a-light type="ambient" color="#ffffff" intensity="0.01"></a-light>
      
      <!-- AQUÍ ESTÁ EL CAMBIO CLAVE PARA TU MARCADOR PERSONALIZADO -->
      <a-marker type="pattern" url="patron.patt" controlador-audio>
        
        <a-entity id="targetEntidad" position="0 0.15 0"></a-entity>
        
        <!-- INTENSIDAD DE LUZ REDUCIDA -->
        <a-light type="spot" 
                 color="#fff4e6" 
                 position="1 6.5 3.2" 
                 rotation="-45 25 0" 
                 intensity="0.8" 
                 angle="35" 
                 penumbra="0.2" 
                 target="#targetEntidad">
        </a-light>

        <a-entity 
          gltf-model="#estatua" 
          scale="0.06 0.06 0.06"  
          position="0 0 0"
          rotation="0 0 0"
          animation-mixer
          fake-envmap>
        </a-entity>
        
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
